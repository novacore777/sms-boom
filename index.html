<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS BOMBER - REHMAN EXPERT</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #050505;
            --neon-green: #00FF41;
            --neon-red: #FF003C;
            --neon-blue: #00F3FF;
            --muted: #1a1a1a;
            --border: #333333;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-dark);
            color: var(--neon-green);
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::selection {
            background: var(--neon-green);
            color: var(--bg-dark);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border-radius: 4px;
        }

        /* Background Grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* CRT Scanlines */
        .crt-scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: float-up 5s infinite;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* Lightning Overlay */
        .lightning-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1696875976066-4e8672a67bfc?crop=entropy&cs=srgb&fm=jpg&ixid=M3w3MjQyMTd8MHwxfHNlYXJjaHw0fHxsaWdodG5pbmclMjBib2x0JTIwZWxlY3RyaWMlMjBzdG9ybSUyMGRhcmslMjBiYWNrZ3JvdW5kfGVufDB8fHx8MTc3MzE2ODk1MHww&ixlib=rb-4.1.0&q=85');
            background-size: cover;
            background-position: center;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
            display: none;
        }

        .lightning-bg.active {
            display: block;
            animation: lightning-flash 0.5s ease-out forwards;
        }

        @keyframes lightning-flash {
            0% { opacity: 0; }
            10% { opacity: 0.9; }
            20% { opacity: 0; }
            30% { opacity: 1; }
            40% { opacity: 0; }
            50% { opacity: 0.7; }
            60% { opacity: 0; }
            70% { opacity: 0.8; }
            80% { opacity: 0; }
            90% { opacity: 0.5; }
            100% { opacity: 0; display: none; }
        }

        /* Main Container */
        .main-content {
            position: relative;
            z-index: 10;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Danger Badge */
        .danger-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.5rem;
            background: rgba(255, 0, 60, 0.1);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
            animation: badge-pulse 2s infinite;
        }

        @keyframes badge-pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 0, 60, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 0, 60, 0.8); }
        }

        /* Skull Icons */
        .skull-icon {
            width: 50px;
            height: 50px;
            fill: none;
            stroke: var(--neon-red);
            stroke-width: 2;
            filter: drop-shadow(0 0 10px var(--neon-red)) drop-shadow(0 0 20px var(--neon-red));
            animation: skull-rotate 2s ease-in-out infinite;
        }

        .skull-icon.left { animation-direction: normal; }
        .skull-icon.right { animation-direction: reverse; }

        @keyframes skull-rotate {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .skull-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--neon-red);
            text-shadow: 
                0 0 10px var(--neon-red),
                0 0 20px var(--neon-red),
                0 0 40px var(--neon-red),
                0 0 80px var(--neon-red);
            margin: 0;
            line-height: 1;
            animation: glitch 0.3s infinite, title-glow 1.5s ease-in-out infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); text-shadow: -2px 0 var(--neon-red), 2px 0 var(--neon-blue); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes title-glow {
            0%, 100% { text-shadow: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red); }
            50% { text-shadow: 0 0 40px var(--neon-red), 0 0 80px var(--neon-red); }
        }

        .title-underline {
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-red), transparent);
            margin-top: 0.5rem;
            animation: underline-glow 2s infinite;
        }

        @keyframes underline-glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .header-subtitle {
            font-size: 0.9rem;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: 1rem;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Status Indicators */
        .status-indicators {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            justify-content: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-item.online { color: var(--neon-green); }
        .status-item.ready { color: var(--neon-blue); }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        .status-dot.green { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
        .status-dot.blue { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Attack Form */
        .attack-form {
            background: rgba(5, 5, 5, 0.95);
            border: 2px solid var(--border);
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 
                0 0 30px rgba(0, 255, 65, 0.1),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .attack-form::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-red), var(--neon-green), var(--neon-blue), var(--neon-red));
            background-size: 400% 400%;
            z-index: -1;
            animation: border-animation 3s ease infinite;
            opacity: 0.3;
        }

        @keyframes border-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Form Header */
        .form-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .zap-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--neon-red);
            stroke-width: 2;
        }

        /* Input Group */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .input-label svg {
            width: 16px;
            height: 16px;
            margin-right: 0.5rem;
            fill: none;
            stroke-width: 2;
        }

        .input-label .target-icon { stroke: var(--neon-red); }
        .input-label .hash-icon { stroke: var(--neon-blue); }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix {
            position: absolute;
            left: 1rem;
            color: var(--neon-green);
            font-size: 1rem;
            opacity: 0.7;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5), inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .input-field::placeholder {
            color: rgba(0, 255, 65, 0.3);
        }

        .input-field:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Attack Button */
        .attack-button {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--neon-red) 0%, #cc0030 100%);
            border: 2px solid var(--neon-red);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: transform 0.2s, box-shadow 0.3s;
        }

        .attack-button:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 0 40px var(--neon-red), 0 0 80px var(--neon-red);
        }

        .attack-button:active:not(:disabled) {
            transform: scale(0.97);
        }

        .attack-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .attack-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s;
        }

        .attack-button:hover:not(:disabled)::before {
            left: 100%;
        }

        .attack-button svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Warning Box */
        .warning-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .warning-box svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: #FFD700;
            stroke-width: 2;
        }

        .warning-text {
            font-size: 0.65rem;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Stats Display */
        .stats-display {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .stat-label {
            font-size: 0.6rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--neon-green);
            font-weight: 700;
        }

        .stat-value.active-status {
            animation: blink 1s infinite;
        }

        .stat-divider {
            width: 1px;
            height: 30px;
            background: var(--border);
        }

        /* Attack Overlay */
        .attack-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .attack-overlay.active {
            display: flex;
        }

        /* Electric Border */
        .electric-border {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        linear-gradient(90deg, var(--neon-red), var(--neon-green), var(--neon-blue), var(--neon-red)) border-box;
            background-size: 400% 400%;
            animation: border-animation 2s ease infinite;
            pointer-events: none;
        }

        /* Troll Face */
        .troll-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .troll-face {
            width: 180px;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px var(--neon-green)) drop-shadow(0 0 30px var(--neon-green));
        }

        .troll-face.shaking {
            animation: troll-shake 0.08s infinite;
        }

        @keyframes troll-shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-8px) rotate(-5deg); }
            50% { transform: translateX(8px) rotate(5deg); }
            75% { transform: translateX(-4px) rotate(-3deg); }
        }

        .attack-ring {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            animation: ring-expand 1s infinite;
        }

        @keyframes ring-expand {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Progress Container */
        .progress-container {
            width: 85%;
            max-width: 550px;
            margin-top: 2rem;
        }

        .progress-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--neon-red);
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px var(--neon-red);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            animation: text-pulse 0.5s infinite;
        }

        @keyframes text-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .progress-text svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--neon-red);
            stroke-width: 2;
        }

        .progress-bar-container {
            background: var(--muted);
            border: 2px solid var(--neon-green);
            padding: 4px;
            height: 35px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            width: 0%;
            transition: width 0.
